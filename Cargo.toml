[workspace]
members = [
  "crates/dawn-core",
  "crates/dawn-grammar-codegen",
  "crates/dawn-lang",
  "crates/dawn-project",
  "crates/dawn-cli",
  "apps/desktop/src-tauri",
]
resolver = "2"

[workspace.package]
edition = "2021"
version = "0.1.0"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dawn-core = { path = "crates/dawn-core" }
dawn-lang = { path = "crates/dawn-lang" }
dawn-project = { path = "crates/dawn-project" }
indexmap = { version = "2", features = ["serde"] }
json-strip-comments = "1"
log = "0.4"
logos = "0.15"
ron = "0.8"
schemars = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
strum = { version = "0.28", features = ["derive"] }
tauri = { version = "2", features = [] }
tauri-build = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tempfile = "3"
thiserror = "2"
ts-rs = { version = "12", features = ["no-serde-warnings"] }
uuid = { version = "1", features = ["v4"] }
walkdir = "2"
